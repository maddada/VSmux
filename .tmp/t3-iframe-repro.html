<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>T3 Iframe Repro</title>
    <style>
      html,
      body {
        background: #0f1722;
        color: #d9e2ec;
        font-family: system-ui, sans-serif;
        height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        gap: 12px;
        grid-template-rows: auto 1fr;
        padding: 12px;
      }

      pre {
        background: #111827;
        border: 1px solid #243244;
        border-radius: 8px;
        margin: 0;
        overflow: auto;
        padding: 12px;
        white-space: pre-wrap;
      }

      iframe {
        background: #101722;
        border: 1px solid #243244;
        border-radius: 8px;
        height: 100%;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <pre id="status">booting…</pre>
    <iframe
      id="frame"
      sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-popups allow-downloads"
    ></iframe>
    <script>
      const bootstrap = {
        bootstrapScriptSrc: "http://127.0.0.1:8037/out/workspace/t3-frame-host.js",
        scriptSrc: "http://127.0.0.1:8037/t3code-embed/dist/assets/index-Dfn7Pjai.js",
        serverOrigin: "http://127.0.0.1:3773",
        sessionId: "repro-session",
        sessionRecordTitle: "T3 Repro",
        styleHref: "http://127.0.0.1:8037/t3code-embed/dist/assets/index-BxIGfSJM.css",
        threadId: "ad3a7988-7724-47e4-b7e1-9c0718352b7a",
        workspaceRoot: "/Users/madda/dev/_active/agent-tiler",
        wsUrl: "ws://127.0.0.1:3773",
      };

      const csp = [
        "default-src 'none'",
        "script-src 'unsafe-eval' 'wasm-unsafe-eval' http:",
        "style-src 'unsafe-inline' http:",
        "img-src http: https: data:",
        "font-src http: https: data:",
        `connect-src ${bootstrap.serverOrigin} ${bootstrap.wsUrl}`,
        "worker-src http: blob:",
      ].join("; ");

      const paneHtml = [
        "<!DOCTYPE html>",
        '<html lang="en">',
        "  <head>",
        '    <meta charset="UTF-8" />',
        `    <meta http-equiv="Content-Security-Policy" content="${csp.replaceAll('"', "&quot;")}" />`,
        '    <meta name="viewport" content="width=device-width, initial-scale=1.0" />',
        `    <title>${bootstrap.sessionRecordTitle}</title>`,
        "    <style>",
        "      html, body, #root {",
        "        background: #101722;",
        "        height: 100%;",
        "        margin: 0;",
        "        width: 100%;",
        "      }",
        "    </style>",
        "  </head>",
        "  <body>",
        '    <div id="root"></div>',
        "    <script>",
        "      const report = (payload) => {",
        "        try { window.parent?.postMessage({ type: 't3-debug', payload }, '*'); } catch {}",
        "      };",
        "      window.addEventListener('error', (event) => {",
        "        report({ kind: 'error', message: event.message, filename: event.filename, lineno: event.lineno, colno: event.colno });",
        "      });",
        "      window.addEventListener('unhandledrejection', (event) => {",
        "        report({ kind: 'unhandledrejection', reason: String(event.reason) });",
        "      });",
        "      for (const level of ['error', 'warn', 'log']) {",
        "        const original = console[level];",
        "        console[level] = (...args) => {",
        "          report({ kind: 'console', level, args: args.map((value) => String(value)) });",
        "          return original.apply(console, args);",
        "        };",
        "      }",
        "      const NativeWebSocket = window.WebSocket;",
        "      class DebugWebSocket extends NativeWebSocket {",
        "        constructor(url, protocols) {",
        "          report({ kind: 'websocket-constructor', url: String(url), protocols: Array.isArray(protocols) ? protocols : protocols ?? null });",
        "          super(url, protocols);",
        "        }",
        "      }",
        "      Object.defineProperties(DebugWebSocket, {",
        "        CONNECTING: { value: NativeWebSocket.CONNECTING },",
        "        OPEN: { value: NativeWebSocket.OPEN },",
        "        CLOSING: { value: NativeWebSocket.CLOSING },",
        "        CLOSED: { value: NativeWebSocket.CLOSED },",
        "      });",
        "      window.WebSocket = DebugWebSocket;",
        "    <\/script>",
        `    <script id="vsmux-t3-bootstrap" type="application/json">${JSON.stringify(bootstrap).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;")}<\/script>`,
        `    <script type="module" src="${bootstrap.bootstrapScriptSrc}"><\/script>`,
        "  </body>",
        "</html>",
      ].join("\n");

      const status = document.getElementById("status");
      const frame = document.getElementById("frame");
      const blob = new Blob([paneHtml], { type: "text/html" });
      const url = URL.createObjectURL(blob);
      frame.src = url;

      window.addEventListener("message", (event) => {
        status.textContent = `postMessage: ${JSON.stringify(event.data)}`;
      });

      frame.addEventListener("load", () => {
        status.textContent = `loaded ${frame.src}`;
      });

      window.addEventListener("error", (event) => {
        status.textContent = `parent error: ${event.message}`;
      });

      window.addEventListener("unhandledrejection", (event) => {
        status.textContent = `parent rejection: ${String(event.reason)}`;
      });
    </script>
  </body>
</html>
